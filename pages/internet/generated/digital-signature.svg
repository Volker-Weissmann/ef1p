<svg width="632.206" height="128.25" viewBox="-1.25 -107.25 632.206 128.25" preserveAspectRatio="xMidYMid" xmlns="http://www.w3.org/2000/svg">

    <metadata>
        <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:schema="http://schema.org/">
            <rdf:Description rdf:about="">
                <schema:author rdf:resource="https://kasparetter.com/"/>
                <schema:license rdf:resource="https://creativecommons.org/licenses/by/4.0/"/>
            </rdf:Description>
        </rdf:RDF>
    </metadata>

    <style>
        @import url("https://fonts.googleapis.com/css?family=Lato:400,700,400italic");

        svg {
            font-family: Lato, Arial, STIXGeneral, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
        }

        svg {
            fill: #000000;
            stroke: #000000;
        }

        text {
            stroke-opacity: 0;
        }

        line, rect, circle, ellipse, polygon, polyline, path {
            fill-opacity: 0;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        marker > path {
            fill-opacity: 1;
            stroke-opacity: 0;
        }

        .font-weight-bold {
            font-weight: bold;
        }

        .blue {
            fill: #0066CC;
            stroke: #0066CC;
        }

        .red {
            fill: #E60000;
            stroke: #E60000;
        }

        .green {
            fill: #009973;
            stroke: #009973;
        }
    </style>

    <defs>
        <marker id="arrow" orient="auto-start-reverse" markerWidth="4" markerHeight="4" refX="4" refY="2">
            <path d="M0,0 L1,2 L0,4 L4,2 Z" />
        </marker>
    </defs>

    <text text-anchor="middle">
        <tspan x="444.755" y="-94.5">Public key</tspan><tspan x="444.755" y="-72.5">of signer</tspan>
    </text>
    <line x1="444.755" y1="-60.5" x2="444.755" y2="-21" marker-end="url(#arrow)" stroke-dasharray="33"></line>
    <text text-anchor="middle">
        <tspan x="184.951" y="-94.5">Private key</tspan><tspan x="184.951" y="-72.5">of signer</tspan>
    </text>
    <line x1="184.951" y1="-60.5" x2="184.951" y2="-21" marker-end="url(#arrow)" stroke-dasharray="33"></line>
    <line x1="490.875" y1="0" x2="629.706" y2="0" marker-end="url(#arrow)" stroke-dasharray="132"></line>
    <text text-anchor="middle">
        <tspan x="560.29" y="-12"><tspan class="green">Valid</tspan> or <tspan class="red">invalid</tspan></tspan>
    </text>
    <line x1="230.133" y1="0" x2="398.636" y2="0" marker-end="url(#arrow)" stroke-dasharray="162"></line>
    <text text-anchor="middle">
        <tspan x="314.853" y="-12">Message, signature</tspan>
    </text>
    <line x1="0" y1="0" x2="138.831" y2="0" marker-end="url(#arrow)" stroke-dasharray="132"></line>
    <text text-anchor="middle">
        <tspan x="69.416" y="-12">Message</tspan>
    </text>
    <rect class="blue" x="140.081" y="-19.75" width="89.739" height="39.5" rx="8" ry="8"></rect>
    <text class="blue" text-anchor="middle">
        <tspan x="184.951" y="5.9"><tspan class="font-weight-bold">Signing</tspan></tspan>
    </text>
    <rect class="blue" x="399.886" y="-19.75" width="89.739" height="39.5" rx="8" ry="8"></rect>
    <text class="blue" text-anchor="middle">
        <tspan x="444.755" y="5.9"><tspan class="font-weight-bold">Verifying</tspan></tspan>
    </text>
    <text text-anchor="middle">
        <tspan x="140.081" y="-41.625"><tspan class="font-weight-bold">Signer</tspan></tspan>
    </text>
    <text text-anchor="middle">
        <tspan x="489.625" y="-41.625"><tspan class="font-weight-bold">Verifier</tspan></tspan>
    </text>

</svg>
