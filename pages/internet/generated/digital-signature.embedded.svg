<svg id="figure-digital-signature" class="figure" data-name="digital-signature" width="632.206" height="128.25" viewBox="-1.25 -107.25 632.206 128.25" preserveAspectRatio="xMidYMid" xmlns="http://www.w3.org/2000/svg">

    <text text-anchor="middle">
